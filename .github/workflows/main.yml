name: Patch APK with apk-mitm

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct download URL of the original APK'
        required: true
        type: string

# Ensure the workflow has permission to push commits back to the repo
permissions:
  contents: write

jobs:
  patch-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        # Java is required for apktool and uber-apk-signer, which apk-mitm uses under the hood
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install apk-mitm globally
        run: npm install -g apk-mitm

      - name: Download the APK
        run: |
          echo "Downloading APK from provided URL..."
          # Using -L to follow redirects, and saving it generically as target.apk
          curl -L -o target.apk "${{ inputs.apk_url }}"

      - name: Patch the APK
        run: |
          echo "Running apk-mitm..."
          apk-mitm target.apk
          
          # apk-mitm outputs the file as <original-name>-patched.apk
          # We rename it to something standard before pushing
          mv target-patched.apk patched_app.apk
          
          # Clean up the original so we don't accidentally commit it
          rm target.apk

      - name: Commit and Push modified APK to repo
        run: |
          # Configure git identity for the GitHub Actions bot
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add and commit the patched APK
          git add patched_app.apk
          git commit -m "chore: add patched APK generated by apk-mitm"
          
          # Push back to the branch that triggered the workflow
          git push origin HEAD:${{ github.ref_name }}
