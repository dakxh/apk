name: Patch APK with apk-mitm

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct download URL of the original APK'
        required: true
        type: string

# Ensure the workflow has permission to push commits back to the repo
permissions:
  contents: write

jobs:
  patch-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        # Java is required for apktool and uber-apk-signer, which apk-mitm uses under the hood
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install apk-mitm globally
        run: npm install -g apk-mitm

      - name: Download the APK/Bundle
        run: |
          echo "Downloading app from provided URL..."
          
          # Extract the original filename from the URL to preserve .apk, .apks, or .xapk
          # If no filename is detected in the URL, default to app.apk
          FILENAME=$(basename "${{ inputs.apk_url }}" | cut -d? -f1)
          if [[ ! "$FILENAME" =~ \.(apk|apks|xapk)$ ]]; then
            FILENAME="app.apk"
          fi
          
          echo "Saving file as: $FILENAME"
          curl -L -o "$FILENAME" "${{ inputs.apk_url }}"
          
          # Quick sanity check to ensure we didn't download an HTML block page
          FILE_TYPE=$(file -b "$FILENAME")
          if [[ "$FILE_TYPE" == *"HTML"* ]]; then
            echo "ERROR: The downloaded file is an HTML page, not an APK. Check your URL."
            exit 1
          fi
          
          # Pass the filename to the next step
          echo "TARGET_FILE=$FILENAME" >> $GITHUB_ENV

      - name: Patch the App
        run: |
          echo "Running apk-mitm on ${{ env.TARGET_FILE }}..."
          apk-mitm "${{ env.TARGET_FILE }}"
          
          # apk-mitm appends '-patched' to the original filename before the extension
          # Extract the name and extension to find the output file dynamically
          BASENAME="${TARGET_FILE%.*}"
          EXT="${TARGET_FILE##*.}"
          PATCHED_FILE="${BASENAME}-patched.${EXT}"
          
          # Rename it to something standard for the git commit
          mv "$PATCHED_FILE" patched_app."$EXT"
          
          # Clean up the original
          rm "${{ env.TARGET_FILE }}"

      - name: Commit and Push modified APK to repo
        run: |
          # Configure git identity for the GitHub Actions bot
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add and commit the patched APK
          git add patched_app.apk
          git commit -m "chore: add patched APK generated by apk-mitm"
          
          # Push back to the branch that triggered the workflow
          git push origin HEAD:${{ github.ref_name }}
